name: build-paper-pdf

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: future_constrained_pruning_and_synchronicity.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: future-constrained-pruning-paper-pdf
          path: future_constrained_pruning_and_synchronicity.pdf
